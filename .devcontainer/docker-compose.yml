services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:1-20-bookworm
    volumes:
      - ../..:/workspaces:cached
      - vscode-server:/home/node/.vscode-server:cached
    command: sleep infinity

  api:
    image: ghcr.io/masonflint44/budgetbros-budget-api:0.1.0
    environment:
      DATABASE_URL: ${BUDGET_API_DATABASE_URL:-postgresql+asyncpg://budgetbros:budgetbros@postgres:5432/budgetbros}
      COGNITO_ISSUER: ${BUDGET_API_COGNITO_ISSUER:-https://cognito-idp.us-east-1.amazonaws.com/us-east-1_LqiRYd1FD}
      COGNITO_CLIENT_IDS: ${BUDGET_API_COGNITO_CLIENT_IDS:-555epl19epj9i0erat76c44803}
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: budgetbros
      POSTGRES_USER: budgetbros
      POSTGRES_PASSWORD: budgetbros
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres-data:
  vscode-server:
